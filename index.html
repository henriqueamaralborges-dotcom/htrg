<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo of Silence | Eco do Silêncio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <div id="intro-screen" class="screen active">
                <h1 class="title">Echo of Silence</h1>
                <p class="subtitle">Uma jornada pelo Limbo das Frequências</p>
                <button id="start-btn">Iniciar Experiência</button>
            </div>
            <div id="cutscene-screen" class="screen">
                <div class="subtitle-box"></div>
            </div>
            <div id="ui-overlay" class="screen">
                <div class="vibration-alert"></div>
                <div class="instinct-indicator"></div>
            </div>
        </div>
    </div>
    <script src="game.js" type="module"></script>
</body>
</html>
